spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/outbox_demo
      # Important: Replica Set is required for Transactions
      auto-index-creation: true

namastack:
  outbox:
    enabled: true

    # Polling Configuration (1.6.x format)
    polling:
      trigger: fixed
      batch-size: 10
      fixed:
        interval: 2s

    # MongoDB Persistence
    mongodb:
      enabled: true

    # Processing Configuration
    processing:
      stop-on-first-failure: true
      delete-completed-records: false

    # Event Multicaster - auto-intercept ApplicationEventPublisher
    multicaster:
      enabled: true
      publish-after-save: true

    # Retry Configuration
    retry:
      policy: exponential
      max-retries: 10
      exponential:
        initial-delay: 2s
        max-delay: 1m
        multiplier: 2.0

logging:
  level:
    io.namastack.outbox: DEBUG
    org.springframework.data.mongodb: DEBUG
